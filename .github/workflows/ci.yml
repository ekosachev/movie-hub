name: Go CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' 
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: ./back/go.sum 

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests
      run: go test -v ./...

    - name: Build the application
      run: go build -o movie-hub-bin ./cmd/api

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-releases@v2
      with:
        files: back/movie-hub-bin
        body: "Автоматическая сборка Movie Hub"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: ./back
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/movie-hub:latest
          ghcr.io/${{ github.repository_owner }}/movie-hub:${{ github.sha }}